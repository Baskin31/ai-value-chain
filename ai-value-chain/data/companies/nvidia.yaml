is_dark_horse: false
description: >
  Dominant AI accelerator GPU designer with 80%+ AI training share. CUDA
  software ecosystem creates a 10+ year moat that is harder to replicate
  than the hardware itself. Designs H100/B100/B200 GPUs fabbed at TSMC N4/N3.
  Four independent TAMs: AI training, inference, robotics, autonomous vehicles.

investability:
  type: direct
  notes: "Listed on NASDAQ as NVDA. Highly liquid large-cap. One of the most widely held AI stocks globally."
  proxy_for: null

