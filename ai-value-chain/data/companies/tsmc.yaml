id: tsmc
name: Taiwan Semiconductor Manufacturing Company
ticker: TSM
exchange: "NYSE (ADR; primary: 2330.TW on TWSE)"
layer: fabrication_packaging
is_dark_horse: false
description: >
  World's dominant contract semiconductor manufacturer. Sole producer of
  leading-edge logic at 3nm and 2nm at commercial scale. NVIDIA, Apple, AMD,
  Qualcomm, and Broadcom all depend on TSMC exclusively for their most advanced
  chips. ~60% global foundry market share by revenue.

investability:
  type: adr
  notes: "NYSE ADR as TSM (liquid, highly traded). Primary listing on TWSE as 2330.TW for direct Taiwan exposure. Note: Taiwan geopolitical risk applies to both listings."
  proxy_for: null

model:
  model_updated: "2026-07-06"
  moat_durability: 9
  moat_durability_rationale: "Sole manufacturer of leading-edge logic below 5nm at scale; estimated 10-year manufacturing lead over nearest competitor (Samsung Foundry)"
  revenue_defensibility: 9
  revenue_defensibility_rationale: "Multi-year capacity agreements with Apple, NVIDIA, AMD, Qualcomm — most revenue booked 12-18 months in advance; customers cannot switch"
  balance_sheet_strength: 8
  balance_sheet_rationale: "Net cash; $40B+ annual capex capacity self-funded; fortress balance sheet despite massive ongoing investment"
  downside_scenario: >
    Taiwan geopolitical risk materializes — this is the dominant tail risk
    and cannot be hedged by most investors. TSMC Arizona ramp slower and
    more expensive than planned, eroding margin advantage.
  market_expansion: 9
  market_expansion_rationale: "AI accelerator demand driving unprecedented 3nm and 2nm capacity expansion; CoWoS advanced packaging is a new revenue stream"
  competitive_position_ceiling: 9
  competitive_position_rationale: "No competitor within 5 years of matching N3/N2 economics — ceiling is structurally very high if Taiwan risk is managed"
  strategic_optionality: 9
  strategic_optionality_rationale: "Every AI chip regardless of designer is fabbed at TSMC — they benefit from the entire AI stack scaling with no application-layer risk"
  upside_probability: 0.60
  upside_multiple: 2.5
  valuation_sentiment: stretched

