    expected. Geopolitical restrictions on China sales expand.
  market_expansion: 9
  market_expansion_rationale: "AI training, inference, robotics, autonomous vehicles, simulation — four independent TAMs, each alone justifying a large company"
  competitive_position_ceiling: 7
