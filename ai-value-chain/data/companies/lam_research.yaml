id: lam_research
name: Lam Research Corporation
ticker: LRCX
exchange: NASDAQ
layer: lithography_fab_equipment
is_dark_horse: false
description: >
  Dominant supplier of etch and deposition equipment for memory semiconductors.
  ~60% share of the etch equipment market. Revenue heavily tied to NAND and
  DRAM capex cycles. HBM memory for AI accelerators is a structural new demand driver.

investability:
  type: direct
  notes: "Listed on NASDAQ as LRCX. High-liquidity US-listed semiconductor equipment company."
  proxy_for: null

model:
  model_updated: "2026-07-06"
  moat_durability: 7
  moat_durability_rationale: "Dominant in etch (60%+ market share) and deposition for memory — deep process-of-record qualifications at SK Hynix, Micron, Samsung"
  revenue_defensibility: 7
  revenue_defensibility_rationale: "Memory-heavy revenue mix means cyclicality is higher than ASML; service revenue ~35% of sales partially offsets"
  balance_sheet_strength: 8
  balance_sheet_rationale: "Net cash, very strong FCF, conservative balance sheet management"
  downside_scenario: >
    Memory capex downcycle (NAND oversupply is the historical pattern every 3-4 years).
    China export restrictions erode ~30% of revenue.
  market_expansion: 7
  market_expansion_rationale: "HBM (high bandwidth memory) for AI training requires new atomic-layer etch processes Lam dominates — direct AI tailwind"
  competitive_position_ceiling: 7
  competitive_position_rationale: "Etch dominance is real and defensible; memory capex cycles are violent but recoverable at each new node"
  strategic_optionality: 7
  strategic_optionality_rationale: "Every AI chip needs HBM — every HBM wafer requires Lam etch tools; inference scaling is a second wave"
  upside_probability: 0.50
  upside_multiple: 3.0
  valuation_sentiment: stretched

