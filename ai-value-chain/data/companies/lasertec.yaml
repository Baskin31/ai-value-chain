id: lasertec
name: Lasertec Corporation
ticker: LSRCF
exchange: "OTC (primary: 6920.T on Tokyo Stock Exchange)"
layer: lithography_fab_equipment
is_dark_horse: true
description: >
  Only supplier of EUV mask inspection systems (ACTIS series) — a monopoly
  in a critical chokepoint that ASML's EUV production depends on. Every EUV
  photomask must pass ACTIS inspection before use. High-NA EUV requires an
  entirely new ACTIS generation, creating a new product cycle.

investability:
  type: adr
  notes: "Trades OTC in the US as LSRCF (thin liquidity — use limit orders). Primary listing on Tokyo Stock Exchange as 6920.T — more liquid. Requires Japan-capable brokerage or international custodian for TSE access."
  proxy_for: null

