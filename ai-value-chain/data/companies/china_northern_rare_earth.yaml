description: >
  World's largest single rare earth mining and processing company. The Bayan Obo
  deposit in Inner Mongolia has decades of reserves of light REEs (Nd, Pr, La, Ce).
  NdPr (neodymium-praseodymium) is the critical input for permanent magnets in
  EVs, wind turbines, and robotics — no synthetic substitute exists.

