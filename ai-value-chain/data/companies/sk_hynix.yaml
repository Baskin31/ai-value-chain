    type: customer
    note: "Critical HBM etch and deposition equipment — Lam's ALD tools are central to HBM production"
  - company_id: micron
    type: competitor
    note: "Global DRAM market: SK Hynix #1 in HBM, competes directly with Micron for AI accelerator HBM supply"
  - company_id: samsung_electronics
    type: competitor
    note: "Direct competitor in DRAM and HBM — Samsung is attempting HBM4 recovery to reclaim market share"
