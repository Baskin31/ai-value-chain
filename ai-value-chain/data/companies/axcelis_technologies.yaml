id: axcelis_technologies
name: Axcelis Technologies Inc.
ticker: ACLS
exchange: NASDAQ
layer: lithography_fab_equipment
is_dark_horse: true
description: >
  Dominant supplier of ion implant equipment for silicon carbide (SiC) power
  semiconductors — ~60% share of SiC implant market. SiC power devices are
  essential for EV inverters and data center power conversion, making Axcelis
  a picks-and-shovels play on both AI data center infrastructure and EV adoption.

investability:
  type: direct
  notes: "Listed on NASDAQ as ACLS. Small-to-mid cap US-listed. SiC implant pure-play."
  proxy_for: null

model:
  model_updated: "2026-07-06"
  moat_durability: 6
  moat_durability_rationale: "Dominant in SiC ion implant (60%+ share) — SiC process qualification is lengthy and expensive, creating high switching costs"
  revenue_defensibility: 6
  revenue_defensibility_rationale: "SiC implant is sticky once qualified at a fab; service revenue growing; but SiC cycle has softened"
  balance_sheet_strength: 7
  balance_sheet_rationale: "Net cash, solid FCF, no debt — clean balance sheet for a small-cap"
  downside_scenario: >
    EV adoption slowdown reduces SiC power device demand.
    Sumitomo Heavy Industries develops competitive SiC implant system.
  market_expansion: 6
  market_expansion_rationale: "SiC power devices needed for EV inverters and data center power conversion (server PSUs, UPS) — both are AI-adjacent tailwinds"
  competitive_position_ceiling: 6
  competitive_position_rationale: "Could own SiC implant as the SiC market scales 10x through 2030 — market leadership in a growing niche"
  strategic_optionality: 5
  strategic_optionality_rationale: "AI data center power efficiency requires SiC power devices in PSUs and UPS — indirect AI infrastructure exposure"
  upside_probability: 0.35
  upside_multiple: 4.0
  valuation_sentiment: cheap

